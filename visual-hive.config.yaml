ai:
    createIssuePrompt: true
    enabled: false
    neverSoleOracle: true
    provider: none
contracts:
    - description: The public page must expose the production-ready marker and status.
      id: production-ready-marker
      runOn:
        pullRequest: true
        schedule: true
      screenshots:
        - name: production-ready
          route: /
          viewport: desktop
      steps:
        - action: goto
          route: /
          description: Navigate to /
          state: visible
          timeoutMs: 15000
        - action: assertVisible
          selector: "[data-testid='healthy-marker']"
          description: Assert [data-testid='healthy-marker'] is visible
          state: visible
          timeoutMs: 15000
      selectors:
        mustExist:
            - '[data-testid=''healthy-marker'']'
        mustNotExist:
            - '[data-testid=''broken-marker'']'
        textMustExist:
            - Production ready
        textMustNotExist:
            - Setup incomplete
      severity: high
      target: localPreview
      waitFor:
        - selector: body
          state: visible
          timeoutMs: 5000
github:
    commentMarker: <!-- visual-hive-report -->
    enabled: true
    issueLabels:
        - visual-hive
        - product-proof
integrations:
    hive:
        enabled: true
        labels:
            - visual-hive
            - hive/quality
            - ai-ready
        mode: guarded_repair
mutation:
    enabled: false
    minScore: 0.7
    operators: []
project:
    defaultBranch: main
    name: hive-specialist-product-proof
    setupProfile: free-local
    type: static
providers:
    argos:
        enabled: false
selection:
    changedFiles:
        - contracts:
            - production-ready-marker
          pattern: index.html
          risk: medium
targets:
    localPreview:
        build: npm run build
        cost: cheap
        install: npm ci
        kind: command
        prSafe: true
        serve: npm run serve
        url: http://127.0.0.1:4173
viewports:
    desktop:
        height: 720
        width: 1280
visual:
    artifactDir: .visual-hive/artifacts
    baselinePlatform: shared
    failOnMissingBaselineInCI: true
    maxDiffPixelRatio: 0.01
    snapshotDir: .visual-hive/snapshots
    updateSnapshots: false
